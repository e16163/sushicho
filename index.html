<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sushicho · 鮨帖</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root{--white:#FAFAFA;--cream:#FFF5F5;--red:#C0392B;--red2:#E74C3C;--pink:#FDE8E8;--pink2:#FAD4D4;--rose:#F0BABA;--g1:#111111;--g2:#333333;--g3:#666666;--g4:#999999;--g5:#CCCCCC;--g6:#F0EDED;--border:#E5DADA}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--white);color:var(--g1);min-height:100vh;overflow-x:hidden}

header{position:sticky;top:0;z-index:300;background:var(--white);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;height:52px;gap:0}
.logo{display:flex;align-items:center;gap:9px;cursor:pointer;text-decoration:none;margin-right:36px;flex-shrink:0}
.logo-text{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--g1);letter-spacing:-.3px}
.logo-jp{font-family:'Playfair Display',serif;font-size:13px;color:var(--red)}
nav{display:flex;gap:0}
.nav-btn{background:none;border:none;cursor:pointer;padding:0 15px;height:52px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;color:var(--g3);border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px}
.nav-btn:hover{color:var(--g1)}
.nav-btn.active{color:var(--red);border-bottom-color:var(--red);font-weight:500}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.search-wrap{display:flex;align-items:center;gap:7px;border:1px solid var(--border);border-radius:6px;padding:6px 11px;background:var(--g6)}
.search-wrap input{background:none;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--g1);width:170px}
.search-wrap input::placeholder{color:var(--g4)}
.search-lbl{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--g4)}
.login-btn{border:1px solid var(--border);background:none;cursor:pointer;padding:7px 15px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--g2);transition:all .15s}
.login-btn:hover{border-color:var(--g1);color:var(--g1)}
.add-btn{border:1px solid var(--red);background:var(--red);cursor:pointer;padding:7px 15px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:white;transition:all .15s}
.add-btn:hover{background:var(--red2)}

.app-layout{display:grid;grid-template-columns:1fr 300px;min-height:calc(100vh - 52px)}
.content-col{border-right:1px solid var(--border);min-width:0}

.filters{position:sticky;top:52px;z-index:200;background:var(--white);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.f-btn{background:none;border:1px solid var(--border);padding:5px 13px;border-radius:20px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--g3);transition:all .13s}
.f-btn:hover{color:var(--g1);border-color:var(--g5)}
.f-btn.active{background:var(--red);border-color:var(--red);color:white;font-weight:500}
.f-sep{width:1px;height:16px;background:var(--border);flex-shrink:0;margin:0 2px}
.view-toggle{display:flex;gap:3px}
.vt-btn{background:none;border:1px solid var(--border);padding:5px 12px;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--g3);transition:all .12s}
.vt-btn.active{background:var(--g6);color:var(--g1);border-color:var(--g5);font-weight:500}
.sort-sel{margin-left:auto;background:none;border:1px solid var(--border);padding:5px 9px;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--g3);outline:none}
.count-lbl{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--g4)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:0}
.card{background:var(--white);border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;animation:rise .3s both;overflow:hidden}
.card:hover{background:var(--cream)}
.card:hover .card-img img{transform:scale(1.04)}
@keyframes rise{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.card-img{width:100%;height:155px;overflow:hidden;position:relative;background:var(--pink)}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease;display:block}
.card-img-fallback{position:absolute;inset:0;display:none;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:36px;color:var(--rose);background:var(--pink)}
.img-region-tag{position:absolute;top:8px;left:8px;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;letter-spacing:.4px;text-transform:uppercase;color:white;padding:2px 8px;border-radius:20px}
.tag-japan{background:rgba(192,57,43,.82)}.tag-na{background:rgba(30,80,60,.82)}.tag-custom{background:rgba(100,80,40,.82)}
.michelin-badge{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.92);border-radius:20px;padding:2px 8px;font-family:'DM Sans',sans-serif;font-size:10px;color:var(--red);font-weight:600;letter-spacing:.5px}
.card-body{padding:13px 15px 11px}
.card-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;line-height:1.2;color:var(--g1);margin-bottom:3px}
.card-meta{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--g4);margin-bottom:5px}
.card-type{font-family:'DM Sans',sans-serif;font-size:11px;font-style:italic;color:var(--g3);margin-bottom:7px}
.card-desc{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--g3);line-height:1.6;margin-bottom:11px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:9px;border-top:1px solid var(--border)}
.rating-block{display:flex;align-items:baseline;gap:0;flex-wrap:wrap}
.rating-num{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--g1);line-height:1}
.rating-denom{font-family:'DM Sans',sans-serif;font-size:10px;color:var(--g4);margin-left:2px}
.rating-reviews{font-family:'DM Sans',sans-serif;font-size:10px;color:var(--g4);margin-left:5px;white-space:nowrap}
.rating-unrated{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--g5);font-style:italic}
.card-footer-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.price-lbl{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--g3)}
.rate-btn{background:none;border:1px solid var(--border);padding:4px 11px;border-radius:20px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--g3);transition:all .12s}
.rate-btn:hover{border-color:var(--red);color:var(--red)}
.rate-btn.rated{background:var(--pink);border-color:var(--rose);color:var(--red);font-weight:500}
.comm-bar-wrap{height:2px;background:var(--border);margin:0;overflow:hidden}
.comm-bar{height:100%;background:var(--red);transition:width .4s}

/* MAP */
#view-map{display:none}
#leaflet-map{width:100%;height:calc(100vh - 52px - 48px);min-height:400px;z-index:1}
.map-legend{position:absolute;bottom:28px;left:10px;background:white;border:1px solid var(--border);border-radius:8px;padding:10px 13px;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--g3);box-shadow:0 2px 8px rgba(0,0,0,.08);z-index:999}
.map-legend-item{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.map-legend-item:last-child{margin-bottom:0}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
/* Custom Leaflet tooltip */
.sushi-tooltip{font-family:'DM Sans',sans-serif;font-size:12px;line-height:1.5;border:1px solid var(--border)!important;border-radius:8px!important;padding:9px 12px!important;box-shadow:0 6px 20px rgba(0,0,0,.12)!important;background:white!important;color:var(--g1)!important;pointer-events:none}
.sushi-tooltip .t-name{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;margin-bottom:2px}
.sushi-tooltip .t-meta{color:var(--g4);font-size:11px;margin-bottom:3px}
.sushi-tooltip .t-rating{color:var(--red);font-size:12px;font-weight:500}
.leaflet-tooltip.sushi-tooltip::before{display:none}

/* SIDE */
.side-panel{position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;background:var(--white)}
.side-sec{padding:18px 18px 0}
.side-sec+.side-sec{border-top:1px solid var(--border);margin-top:14px;padding-top:18px}
.side-sec:last-child{padding-bottom:18px}
.side-heading{font-family:'DM Serif Display',serif;font-size:14px;color:var(--g1);margin-bottom:12px;letter-spacing:-.2px}
.side-heading em{font-style:italic;color:var(--red)}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px}
.stat-mini{background:var(--pink);border-radius:8px;padding:11px 8px;text-align:center}
.stat-mini-n{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--red);line-height:1}
.stat-mini-l{font-family:'DM Sans',sans-serif;font-size:10px;color:var(--g3);margin-top:2px}
.tag-cloud{display:flex;flex-wrap:wrap;gap:5px;padding-bottom:14px}
.tag-pill{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--g2);background:var(--g6);border:1px solid var(--border);padding:3px 9px;border-radius:20px;cursor:pointer;transition:all .12s}
.tag-pill:hover{background:var(--pink);border-color:var(--rose);color:var(--red)}
.rec-card{display:flex;gap:9px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .12s}
.rec-card:hover{opacity:.72}
.rec-card:last-child{border-bottom:none}
.rec-thumb{width:50px;height:50px;border-radius:7px;overflow:hidden;flex-shrink:0;background:var(--pink)}
.rec-thumb img{width:100%;height:100%;object-fit:cover}
.rec-info{flex:1;min-width:0}
.rec-name{font-family:'Playfair Display',serif;font-size:13px;font-weight:600;color:var(--g1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rec-meta{font-family:'DM Sans',sans-serif;font-size:10px;color:var(--g4);margin:1px 0 2px}
.rec-reason{font-family:'DM Sans',sans-serif;font-size:10px;color:var(--g3);font-style:italic}
.top-item{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .12s}
.top-item:hover{opacity:.7}
.top-item:last-child{border-bottom:none}
.top-rank{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--rose);width:20px;text-align:right;flex-shrink:0}
.top-name{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--g1);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-city{font-family:'DM Sans',sans-serif;font-size:10px;color:var(--g4);flex-shrink:0}
.top-score{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;color:var(--red);flex-shrink:0}

/* MODALS */
.overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.38);align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.overlay.open{display:flex}
@keyframes popin{from{opacity:0;transform:scale(.96) translateY(7px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-box{background:var(--white);border-radius:12px;max-width:400px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.14);animation:popin .2s ease;overflow:hidden;position:relative}
.modal-header{padding:22px 22px 18px;border-bottom:1px solid var(--border)}
.modal-title{font-family:'DM Serif Display',serif;font-size:21px;color:var(--g1)}
.modal-sub{font-family:'DM Sans',sans-serif;font-size:12px;color:var(--g3);margin-top:3px}
.modal-body{padding:18px 22px 22px}
.modal-close{position:absolute;top:12px;right:12px;background:var(--g6);border:none;width:27px;height:27px;border-radius:50%;cursor:pointer;color:var(--g3);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .12s;z-index:1;font-family:'DM Sans',sans-serif}
.modal-close:hover{background:var(--border);color:var(--g1)}
.form-field{margin-bottom:13px}
.form-label{display:block;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--g3);margin-bottom:5px}
.form-inp,.form-sel,.form-ta{width:100%;background:var(--g6);border:1px solid var(--border);padding:9px 11px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--g1);outline:none;border-radius:8px;transition:border-color .12s}
.form-inp:focus,.form-sel:focus,.form-ta:focus{border-color:var(--red);background:var(--white)}
.form-ta{resize:vertical;min-height:65px;font-size:13px;line-height:1.6}
.btn-primary{width:100%;padding:11px;background:var(--red);color:white;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:background .12s;border-radius:8px;margin-top:4px}
.btn-primary:hover{background:var(--red2)}
.modal-switch{text-align:center;margin-top:11px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--g3)}
.modal-switch a{color:var(--red);cursor:pointer;text-decoration:underline}
.rate-modal{background:var(--white);border-radius:12px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.14);animation:popin .2s ease}
.rate-modal-img{width:100%;height:190px;overflow:hidden;position:relative;background:var(--pink)}
.rate-modal-img img{width:100%;height:100%;object-fit:cover}
.rate-modal-grad{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,rgba(0,0,0,.55))}
.rate-modal-name{position:absolute;bottom:13px;left:16px;right:48px;font-family:'DM Serif Display',serif;font-size:24px;font-style:italic;color:white;line-height:1.1}
.rate-modal-body{padding:18px 20px 22px}
.rate-modal-loc{font-family:'DM Sans',sans-serif;font-size:10px;color:var(--g4);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.rate-modal-type{font-family:'DM Sans',sans-serif;font-size:12px;font-style:italic;color:var(--g3);margin-bottom:11px}
.rate-modal-desc{font-family:'DM Sans',sans-serif;font-size:12.5px;color:var(--g2);line-height:1.7;border-left:3px solid var(--pink2);padding-left:11px;margin-bottom:16px}
.comm-stats-row{display:flex;gap:16px;margin-bottom:16px;padding:12px 14px;background:var(--pink);border-radius:8px;align-items:center}
.comm-stat{display:flex;flex-direction:column;align-items:center;flex:1}
.comm-stat-n{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--red);line-height:1}
.comm-stat-l{font-family:'DM Sans',sans-serif;font-size:10px;color:var(--g3);margin-top:2px}
.comm-stat-sep{width:1px;height:32px;background:var(--rose);flex-shrink:0}
.rate-hr{height:1px;background:var(--border);margin:0 0 16px}
.your-rating-hd{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--g3);margin-bottom:10px}
.slider-display{text-align:center;margin-bottom:7px}
.slider-num{font-family:'Playfair Display',serif;font-size:58px;font-weight:700;color:var(--g1);line-height:1}
.slider-word{font-family:'DM Sans',sans-serif;font-size:12px;font-style:italic;color:var(--red);min-height:17px}
input[type=range].rng{-webkit-appearance:none;appearance:none;width:100%;height:3px;outline:none;cursor:pointer;border-radius:2px;background:linear-gradient(to right,var(--red) 50%,var(--border) 50%);margin:11px 0}
input[type=range].rng::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:19px;height:19px;border-radius:50%;background:var(--white);border:2.5px solid var(--red);cursor:pointer;box-shadow:0 2px 5px rgba(192,57,43,.28);transition:transform .1s}
input[type=range].rng::-webkit-slider-thumb:hover{transform:scale(1.2)}
.slider-ends{display:flex;justify-content:space-between;font-family:'DM Sans',sans-serif;font-size:10px;color:var(--g4)}
.login-notice{background:var(--pink);border:1px solid var(--rose);border-radius:8px;padding:8px 11px;margin-bottom:12px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--red);line-height:1.5}
.login-notice a{color:var(--red);cursor:pointer;font-weight:500;text-decoration:underline}
.submit-btn{width:100%;padding:11px;margin-top:14px;background:var(--red);color:white;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:background .12s;border-radius:8px}
.submit-btn:hover{background:var(--red2)}
.submit-btn.rated{background:#2E7D5E}
.add-modal{background:var(--white);border-radius:12px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.14);animation:popin .2s ease}
.add-hd{padding:20px 22px 16px;border-bottom:1px solid var(--border);position:relative}
.add-hd-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--g1)}
.add-hd-sub{font-family:'DM Sans',sans-serif;font-size:12px;color:var(--g3);margin-top:3px}
.add-body{padding:18px 22px 22px}
.form-row{margin-bottom:13px}
.form-row.two{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.form-label span{color:var(--red)}
.form-footer{display:flex;gap:8px;justify-content:flex-end;padding-top:13px;border-top:1px solid var(--border)}
.btn-cancel{background:none;border:1px solid var(--border);padding:8px 16px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--g3);transition:all .12s}
.btn-cancel:hover{border-color:var(--g1);color:var(--g1)}
.btn-save{background:var(--red);color:white;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;transition:background .12s}
.btn-save:hover{background:var(--red2)}
.user-chip{display:flex;align-items:center;gap:7px;background:var(--g6);border:1px solid var(--border);padding:5px 11px;border-radius:20px}
.user-avatar{width:19px;height:19px;border-radius:50%;background:var(--red);color:white;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700}
.user-name-chip{font-family:'DM Sans',sans-serif;font-size:12px;color:var(--g1)}
.logout-btn{background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--g4);text-decoration:underline;transition:color .12s}
.logout-btn:hover{color:var(--red)}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--g1);color:white;padding:9px 18px;border-radius:20px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;z-index:600;animation:tin .2s ease,tout .2s 2.6s ease forwards;white-space:nowrap}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(5px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes tout{to{opacity:0;transform:translateX(-50%) translateY(5px)}}
.empty{text-align:center;padding:60px 40px;font-family:'Playfair Display',serif;font-size:17px;color:var(--g4)}

@media(max-width:900px){.app-layout{grid-template-columns:1fr}.side-panel{display:none}header{padding:0 14px}.search-wrap input{width:120px}.add-btn{display:none}}
</style>
</head>
<body>

<header>
  <a class="logo" onclick="showView('grid')">
    <span class="logo-text">Sushicho</span>
    <span class="logo-jp">鮨帖</span>
  </a>
  <nav>
    <button class="nav-btn active" id="btn-grid" onclick="showView('grid')">Browse</button>
    <button class="nav-btn" id="btn-map"  onclick="showView('map')">Map</button>
  </nav>
  <div class="hdr-right">
    <div class="search-wrap">
      <span class="search-lbl">Search</span>
      <input type="text" placeholder="Restaurant, city..." id="search-inp" oninput="onSearch()">
    </div>
    <div id="user-area"></div>
    <button class="add-btn" onclick="openAddModal()">+ Add</button>
  </div>
</header>

<div class="app-layout">
  <div class="content-col">
    <div class="filters">
      <button class="f-btn active" onclick="setFilter('all',this)">All</button>
      <button class="f-btn" onclick="setFilter('japan',this)">Japan</button>
      <button class="f-btn" onclick="setFilter('na',this)">N. America</button>
      <div class="f-sep"></div>
      <button class="f-btn" onclick="setFilter('rated',this)">My Ratings</button>
      <button class="f-btn" onclick="setFilter('custom',this)">Community</button>
      <div class="view-toggle">

const CAPS={1:"Poor",2:"Disappointing",3:"Below Average",4:"Mediocre",5:"Decent",6:"Good",7:"Very Good",8:"Excellent",9:"Outstanding",10:"Perfect"};

// ── HELPERS ───────────────────────────────────────────────────────────────
function mStars(n){return n?'★'.repeat(n):'';}
function getImg(r){return r.img||getImgForId(r.id);}

// ── AUTH ──────────────────────────────────────────────────────────────────
function getUsers(){try{return JSON.parse(localStorage.getItem('sc_users')||'{}');}catch(e){return{};}}
function saveUsers(u){localStorage.setItem('sc_users',JSON.stringify(u));}
function getCurrentUser(){try{return JSON.parse(localStorage.getItem('sc_current')||'null');}catch(e){return null;}}
function setCurrentUser(u){localStorage.setItem('sc_current',JSON.stringify(u));}
function logoutUser(){localStorage.removeItem('sc_current');}
function ratingsKey(u){return u?'sc_ratings_'+u:'sc_ratings_guest';}
function getRatings(){const u=getCurrentUser();try{return JSON.parse(localStorage.getItem(ratingsKey(u))||'{}');}catch(e){return{};}}
function saveRating(id,val){const u=getCurrentUser();const r=getRatings();r[id]=val;localStorage.setItem(ratingsKey(u),JSON.stringify(r));}
function getCustom(){try{return JSON.parse(localStorage.getItem('sc_custom')||'[]');}catch(e){return[];}}
function saveCustom(a){localStorage.setItem('sc_custom',JSON.stringify(a));}
function allRestaurants(){return[...BASE,...getCustom().map(c=>({...c,region:detectRegion(c.country),isCustom:true}))];}
function detectRegion(c){if(c==='Japan')return 'japan';if(['USA','Canada','Mexico'].includes(c))return 'na';return 'custom';}

// ── AUTH UI ───────────────────────────────────────────────────────────────
function renderUserArea(){
  const u=getCurrentUser();
  document.getElementById('user-area').innerHTML=u
    ?`<div class="user-chip"><div class="user-avatar">${u[0].toUpperCase()}</div><span class="user-name-chip">${u}</span><button class="logout-btn" onclick="doLogout()">sign out</button></div>`
    :`<button class="login-btn" onclick="openLogin()">Sign In</button>`;
}
function openLogin(){showAuthPanel('login');document.getElementById('auth-overlay').classList.add('open');document.body.style.overflow='hidden';}
function openRegister(){showAuthPanel('register');}
function closeAuthModal(){document.getElementById('auth-overlay').classList.remove('open');document.body.style.overflow='';}
function showAuthPanel(mode){
  const inner=document.getElementById('auth-inner');
  if(mode==='login'){
    inner.innerHTML=`<div class="modal-header"><div class="modal-title">Welcome back</div><div class="modal-sub">Sign in to save your ratings</div></div>
    <div class="modal-body">
      <div class="form-field"><label class="form-label">Username</label><input class="form-inp" id="au-user" type="text" placeholder="your name" autocomplete="username"></div>
      <div class="form-field"><label class="form-label">Password</label><input class="form-inp" id="au-pass" type="password" placeholder="..." autocomplete="current-password"></div>
      <div id="au-err" style="color:var(--red);font-family:'DM Sans',sans-serif;font-size:12px;min-height:16px;margin-bottom:4px"></div>
      <button class="btn-primary" onclick="doLogin()">Sign In</button>
      <div class="modal-switch">No account? <a onclick="openRegister()">Create one</a></div>
    </div>`;
    setTimeout(()=>document.getElementById('au-user')?.focus(),80);
  } else {
    inner.innerHTML=`<div class="modal-header"><div class="modal-title">Create account</div><div class="modal-sub">Ratings saved per account</div></div>
    <div class="modal-body">
      <div class="form-field"><label class="form-label">Username</label><input class="form-inp" id="au-user" type="text" placeholder="sushi_lover" autocomplete="username"></div>
      <div class="form-field"><label class="form-label">Password</label><input class="form-inp" id="au-pass" type="password" placeholder="..." autocomplete="new-password"></div>
      <div class="form-field"><label class="form-label">Confirm Password</label><input class="form-inp" id="au-pass2" type="password" placeholder="..." autocomplete="new-password"></div>
      <div id="au-err" style="color:var(--red);font-family:'DM Sans',sans-serif;font-size:12px;min-height:16px;margin-bottom:4px"></div>
      <button class="btn-primary" onclick="doRegister()">Create Account</button>
      <div class="modal-switch">Have one? <a onclick="showAuthPanel('login')">Sign in</a></div>
    </div>`;
    setTimeout(()=>document.getElementById('au-user')?.focus(),80);
  }
}
function doLogin(){
  const user=document.getElementById('au-user').value.trim(),pass=document.getElementById('au-pass').value,err=document.getElementById('au-err'),users=getUsers();
  if(!user||!pass){err.textContent='Please fill in all fields.';return;}
  if(!users[user]||users[user]!==pass){err.textContent='Invalid username or password.';return;}
  setCurrentUser(user);closeAuthModal();renderUserArea();renderCards();renderSidePanel();showToast('Welcome back, '+user+'!');
}
function doRegister(){
  const user=document.getElementById('au-user').value.trim(),pass=document.getElementById('au-pass').value,pass2=document.getElementById('au-pass2').value,err=document.getElementById('au-err'),users=getUsers();
  if(!user||!pass){err.textContent='Please fill in all fields.';return;}
  if(pass!==pass2){err.textContent='Passwords do not match.';return;}
  if(pass.length<4){err.textContent='Password too short (min 4 chars).';return;}
  if(users[user]){err.textContent='Username already taken.';return;}
  users[user]=pass;saveUsers(users);setCurrentUser(user);closeAuthModal();renderUserArea();renderCards();renderSidePanel();showToast('Welcome, '+user+'!');
}
function doLogout(){logoutUser();renderUserArea();renderCards();renderSidePanel();showToast('Signed out.');}

// ── STATE ─────────────────────────────────────────────────────────────────
let st={filter:'all',sort:'default',search:'',activeId:null,display:'grid'};

function getFiltered(){
  const rats=getRatings();let list=allRestaurants();
  if(st.filter==='japan') list=list.filter(r=>r.region==='japan');
  if(st.filter==='na')    list=list.filter(r=>r.region==='na');
  if(st.filter==='rated') list=list.filter(r=>rats[r.id]);
  if(st.filter==='custom')list=list.filter(r=>r.isCustom);
  const q=st.search.toLowerCase();
  if(q)list=list.filter(r=>[r.name,r.city,r.area,r.country,r.type].join(' ').toLowerCase().includes(q));
  if(st.sort==='rhi')list.sort((a,b)=>(rats[b.id]||0)-(rats[a.id]||0));
  if(st.sort==='rlo')list.sort((a,b)=>(rats[a.id]||0)-(rats[b.id]||0));
  if(st.sort==='az') list.sort((a,b)=>a.name.localeCompare(b.name));
  if(st.sort==='ph') list.sort((a,b)=>b.price.length-a.price.length);
  if(st.sort==='pl') list.sort((a,b)=>a.price.length-b.price.length);
  return list;
}

// ── RENDER CARDS ──────────────────────────────────────────────────────────
function renderCards(){
  const list=getFiltered(),rats=getRatings(),all=allRestaurants();
  document.getElementById('s-total').textContent=all.length;
  document.getElementById('s-rated').textContent=Object.keys(rats).length;
  document.getElementById('s-michelin').textContent=all.filter(r=>r.m>0).length;
  document.getElementById('count-lbl').textContent=list.length+' shown';
  const grid=document.getElementById('grid'),emp=document.getElementById('empty-state');
  if(!list.length){grid.innerHTML='';emp.style.display='block';return;}
  emp.style.display='none';
  grid.innerHTML=list.map((r,i)=>{
    const rat=rats[r.id],reg=r.isCustom?'custom':r.region;
    const regionLabel=r.isCustom?'Community':(r.region==='japan'?'Japan':r.country);
    const [cRat,cCount]=getCR(r.id);
    let ratingHtml;
    if(rat){
      ratingHtml=`<div class="rating-block"><span class="rating-num">${rat}</span><span class="rating-denom">/10</span><span class="rating-reviews">your rating</span></div>`;
    } else if(cRat){
      ratingHtml=`<div class="rating-block"><span class="rating-num" style="color:var(--g3);font-size:18px">${cRat}</span><span class="rating-denom">/10</span><span class="rating-reviews">${fmtN(cCount)} reviews</span></div>`;
    } else {
      ratingHtml=`<span class="rating-unrated">Not rated</span>`;
    }
    const barPct=cRat?Math.round((cRat/10)*100):0;
    return `<div class="card" style="animation-delay:${(i%12)*.028}s" onclick="openModal(${r.id})">
      <div class="card-img" style="position:relative">
        <img src="${getImg(r)}" alt="${r.name}" loading="lazy"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="card-img-fallback">鮨</div>
        <div class="img-region-tag tag-${reg}">${regionLabel}</div>
        ${r.m?`<div class="michelin-badge">${mStars(r.m)}</div>`:''}
      </div>
      <div class="comm-bar-wrap"><div class="comm-bar" style="width:${barPct}%"></div></div>
      <div class="card-body">
        <div class="card-name">${r.name}</div>
        <div class="card-meta">${r.area?r.area+' · ':''}${r.city}</div>
        <div class="card-type">${r.type}</div>
        <div class="card-desc">${r.desc}</div>
        <div class="card-footer">
          ${ratingHtml}
          <div class="card-footer-right">
            <span class="price-lbl">${r.price}</span>
            <button class="rate-btn ${rat?'rated':''}" onclick="event.stopPropagation();openModal(${r.id})">${rat?'Rated':'Rate'}</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── SIDE PANEL ────────────────────────────────────────────────────────────
function renderSidePanel(){
  const rats=getRatings(),all=allRestaurants();
  const cities=[...new Set(all.map(r=>r.city))].slice(0,12);
  document.getElementById('tag-cloud').innerHTML=cities.map(c=>
    `<span class="tag-pill" onclick="document.getElementById('search-inp').value='${c}';st.search='${c}';renderCards()">${c}</span>`
  ).join('');
  const unrated=all.filter(r=>r.m>=2&&!rats[r.id]).slice(0,5);
  document.getElementById('rec-list').innerHTML=unrated.length?unrated.map(r=>{
    const[cRat,cCount]=getCR(r.id);
    return`<div class="rec-card" onclick="openModal(${r.id})">
      <div class="rec-thumb"><img src="${getImg(r)}" loading="lazy" onerror="this.parentNode.textContent='鮨'" alt="${r.name}"></div>
      <div class="rec-info">
        <div class="rec-name">${r.name}</div>
        <div class="rec-meta">${r.city}${r.m?' · '+mStars(r.m):''} ${cRat?'· '+cRat+'/10':''}</div>
        <div class="rec-reason">Not yet rated by you</div>
      </div>
    </div>`;
  }).join(''):`<div style="font-family:'DM Sans',sans-serif;font-size:12px;color:var(--g4);font-style:italic;padding:8px 0">Rate restaurants to get personalised picks.</div>`;
  const rated=all.filter(r=>rats[r.id]).sort((a,b)=>rats[b.id]-rats[a.id]).slice(0,5);
  const topSec=document.getElementById('top-section');
  if(rated.length){
    topSec.style.display='';
    document.getElementById('top-list').innerHTML=rated.map((r,i)=>
      `<div class="top-item" onclick="openModal(${r.id})">
        <div class="top-rank">${i+1}</div>
        <div class="top-name">${r.name}</div>
        <div class="top-city">${r.city}</div>
        <div class="top-score">${rats[r.id]}</div>
      </div>`
    ).join('');
  } else {topSec.style.display='none';}
}

// ── LEAFLET MAP ───────────────────────────────────────────────────────────
let leafletMap = null;
let leafletMarkers = {};

function makeMarkerIcon(r, rat) {
  const isJ = r.region === 'japan';
  const col = isJ ? '#C0392B' : '#1a5c3a';
  const size = rat ? 24 : 14;
  const half = size / 2;
  let inner;
  if (rat) {
    inner = `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${col};display:flex;align-items:center;justify-content:center;color:white;font-size:9px;font-weight:700;font-family:'DM Sans',sans-serif;box-shadow:0 2px 8px rgba(0,0,0,.3);cursor:pointer">${rat}</div>`;
  } else {
    inner = `<div style="width:${size}px;height:${size}px;border-radius:50%;background:white;border:2px solid ${col};box-shadow:0 2px 6px rgba(0,0,0,.2);cursor:pointer"></div>`;
  }
  return L.divIcon({
    className: '',
    html: inner,
    iconSize: [size, size],
    iconAnchor: [half, half],
    tooltipAnchor: [half, -half]
  });
}

function makeTooltipContent(r, rat) {
  const [cRat, cCount] = getCR(r.id);
  let ratingLine;
  if (rat) ratingLine = `<div class="t-rating">Your rating: ${rat}/10 — ${CAPS[rat]}</div>`;
  else if (cRat) ratingLine = `<div class="t-rating">${cRat}/10 · ${fmtN(cCount)} reviews</div>`;
  else ratingLine = `<div class="t-rating" style="color:#999">Not yet rated</div>`;
  const meta = [r.area, r.city, r.price, r.m ? mStars(r.m) : null].filter(Boolean).join(' · ');
  return `<div class="t-name">${r.name}</div><div class="t-meta">${meta}</div>${ratingLine}`;
}

function drawMap() {
  if (!leafletMap) return;
  const rats = getRatings();
  const list = getFiltered().filter(r => r.lat && r.lng);
  const visibleIds = new Set(list.map(r => String(r.id)));

  // Remove markers no longer in filtered list
  Object.keys(leafletMarkers).forEach(id => {
    if (!visibleIds.has(id)) {
      leafletMap.removeLayer(leafletMarkers[id]);
      delete leafletMarkers[id];
    }
  });

  // Add / update markers
  list.forEach(r => {
    const rat = rats[r.id];
    const id = String(r.id);
    const icon = makeMarkerIcon(r, rat);

    if (leafletMarkers[id]) {
      // Update icon in case rating changed
      leafletMarkers[id].setIcon(icon);
      leafletMarkers[id].setTooltipContent(makeTooltipContent(r, rat));
    } else {
      const marker = L.marker([r.lat, r.lng], { icon, riseOnHover: true });
      marker.bindTooltip(makeTooltipContent(r, rat), {
        className: 'sushi-tooltip',
        direction: 'top',
        offset: [0, -4],
        opacity: 1
      });
      marker.on('click', () => openModal(r.id));
      marker.addTo(leafletMap);
      leafletMarkers[id] = marker;
    }
  });
}

function showMap() {
  if (!leafletMap) {
    leafletMap = L.map('leaflet-map', {
      center: [35, -30],
      zoom: 2,
      zoomControl: true,
      attributionControl: true
    });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(leafletMap);
  }
  setTimeout(() => {
    leafletMap.invalidateSize();
    drawMap();
  }, 80);
}

// ── DISPLAY SWITCH ────────────────────────────────────────────────────────
function switchDisplay(mode){
  st.display=mode;
  const ge=document.getElementById('view-grid'),me=document.getElementById('view-map');
  if(mode==='map'){
    ge.style.display='none';
    me.style.display='block';
    showMap();
  } else {
    me.style.display='none';
    ge.style.display='block';
  }
  document.getElementById('vt-grid').classList.toggle('active',mode==='grid');
  document.getElementById('vt-map').classList.toggle('active',mode==='map');
  document.getElementById('btn-grid').classList.toggle('active',mode==='grid');
  document.getElementById('btn-map').classList.toggle('active',mode==='map');
}
function showView(v){switchDisplay(v==='map'?'map':'grid');}
function setFilter(f,btn){
  st.filter=f;document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  renderCards();if(st.display==='map')drawMap();
}
function setSort(v){st.sort=v;renderCards();if(st.display==='map')drawMap();}
function onSearch(){st.search=document.getElementById('search-inp').value;renderCards();if(st.display==='map')drawMap();}

// ── RATE MODAL ────────────────────────────────────────────────────────────
function openModal(id){
  const all=allRestaurants(),r=all.find(x=>x.id==id);
  if(!r)return;st.activeId=id;
  const rats=getRatings(),rat=rats[id],[cRat,cCount]=getCR(id);
  const iw=document.getElementById('m-img-wrap');
  let img=iw.querySelector('img');
  if(!img){img=document.createElement('img');img.style.cssText='width:100%;height:100%;object-fit:cover';iw.insertBefore(img,iw.firstChild);}
  img.src=getImg(r);
  document.getElementById('m-name').textContent=r.name;
  document.getElementById('m-loc').textContent=[r.area,r.city,r.country,r.price,r.m?mStars(r.m)+' Michelin':null].filter(Boolean).join(' · ');
  document.getElementById('m-type').textContent=r.type;
  document.getElementById('m-desc').textContent=r.desc||'';
  const ce=document.getElementById('m-comm-stats');
  if(cRat){
    ce.style.display='flex';
    ce.innerHTML=`<div class="comm-stat"><div class="comm-stat-n">${cRat}</div><div class="comm-stat-l">Avg score</div></div>
      <div class="comm-stat-sep"></div>
      <div class="comm-stat"><div class="comm-stat-n">${fmtN(cCount)}</div><div class="comm-stat-l">Reviews</div></div>
      ${r.m?`<div class="comm-stat-sep"></div><div class="comm-stat"><div class="comm-stat-n">${mStars(r.m)}</div><div class="comm-stat-l">Michelin</div></div>`:''}`;
  } else {ce.style.display='none';}
  const notice=document.getElementById('m-login-notice');
  if(!getCurrentUser())notice.innerHTML=`<div class="login-notice"><a onclick="closeModal();openLogin()">Sign in</a> to save your ratings permanently.</div>`;
  else notice.innerHTML='';
  const val=rat||5;document.getElementById('m-slider').value=val;onSlider(val);
  const btn=document.getElementById('m-submit');
  if(rat){btn.textContent='Update Rating';btn.classList.add('rated');}
  else{btn.textContent='Submit Rating';btn.classList.remove('rated');}
  document.getElementById('rate-overlay').classList.add('open');document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('rate-overlay').classList.remove('open');document.body.style.overflow='';}
function onSlider(val){
  val=parseInt(val);const pct=(val-1)/9*100;
  document.getElementById('m-val').textContent=val;
  document.getElementById('m-cap').textContent=CAPS[val]||'';
  document.getElementById('m-slider').style.background=`linear-gradient(to right,var(--red) ${pct}%,var(--border) ${pct}%)`;
}
function submitRating(){
  const val=parseInt(document.getElementById('m-slider').value);
  saveRating(st.activeId,val);closeModal();renderCards();renderSidePanel();
  if(st.display==='map')drawMap();
  const r=allRestaurants().find(x=>x.id==st.activeId);
  showToast((r?r.name:'Restaurant')+' · '+val+'/10'+(getCurrentUser()?'':' · sign in to save'));
}

// ── ADD MODAL ─────────────────────────────────────────────────────────────
function openAddModal(){document.getElementById('add-overlay').classList.add('open');document.body.style.overflow='hidden';}
function closeAddModal(){document.getElementById('add-overlay').classList.remove('open');document.body.style.overflow='';}
function submitAdd(){
  const name=document.getElementById('f-name').value.trim(),city=document.getElementById('f-city').value.trim();
  const country=document.getElementById('f-country').value,type=document.getElementById('f-type').value,price=document.getElementById('f-price').value;
  if(!name||!city||!country||!type||!price){alert('Please fill in all required fields.');return;}
  const newR={id:'c_'+Date.now(),name,city,country,area:document.getElementById('f-area').value.trim(),type,price,
    m:parseInt(document.getElementById('f-michelin').value)||0,desc:document.getElementById('f-desc').value.trim(),
    img:document.getElementById('f-img').value.trim()||null,
    lat:parseFloat(document.getElementById('f-lat').value)||null,lng:parseFloat(document.getElementById('f-lng').value)||null,isCustom:true};
  const list=getCustom();list.push(newR);saveCustom(list);closeAddModal();
  ['f-name','f-city','f-area','f-desc','f-lat','f-lng','f-img'].forEach(id=>document.getElementById(id).value='');
  ['f-country','f-type','f-price'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-michelin').value='0';
  renderCards();renderSidePanel();showToast(name+' added!');
}

function closeIfOutside(e,id){
  if(e.target.id===id){if(id==='rate-overlay')closeModal();else if(id==='add-overlay')closeAddModal();else if(id==='auth-overlay')closeAuthModal();}
}
function showToast(msg){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3200);
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeModal();closeAddModal();closeAuthModal();}
  if(e.key==='Enter'){const ao=document.getElementById('auth-overlay');if(ao.classList.contains('open')){if(document.getElementById('au-pass2'))doRegister();else doLogin();}}
});
window.addEventListener('resize',()=>{if(st.display==='map'&&leafletMap)leafletMap.invalidateSize();});

// INIT
renderUserArea();renderCards();renderSidePanel();
</script>
