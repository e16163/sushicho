<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sushicho · 鮨帖</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root{--white:#FAFAFA;--cream:#FFF5F5;--red:#C0392B;--red2:#E74C3C;--pink:#FDE8E8;--pink2:#FAD4D4;--rose:#F0BABA;--g1:#111111;--g2:#333333;--g3:#666666;--g4:#999999;--g5:#CCCCCC;--g6:#F0EDED;--border:#E5DADA;--yelp:#d32323;--gmaps:#4285F4}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--white);color:var(--g1);min-height:100vh;overflow-x:hidden}
header{position:sticky;top:0;z-index:300;background:var(--white);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;height:52px}
.logo{display:flex;align-items:center;gap:9px;cursor:pointer;text-decoration:none;margin-right:36px;flex-shrink:0}
.logo-text{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--g1);letter-spacing:-.3px}
.logo-jp{font-family:'Playfair Display',serif;font-size:13px;color:var(--red)}
nav{display:flex}
.nav-btn{background:none;border:none;cursor:pointer;padding:0 15px;height:52px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--g3);border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px}
.nav-btn:hover{color:var(--g1)}
.nav-btn.active{color:var(--red);border-bottom-color:var(--red);font-weight:500}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.search-wrap{display:flex;align-items:center;gap:7px;border:1px solid var(--border);border-radius:6px;padding:6px 11px;background:var(--g6)}
.search-wrap input{background:none;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--g1);width:170px}
.search-wrap input::placeholder{color:var(--g4)}
.search-lbl{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--g4)}
.login-btn{border:1px solid var(--border);background:none;cursor:pointer;padding:7px 15px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--g2);transition:all .15s}
.login-btn:hover{border-color:var(--g1);color:var(--g1)}
.add-btn{border:1px solid var(--red);background:var(--red);cursor:pointer;padding:7px 15px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:white;transition:all .15s}
.add-btn:hover{background:var(--red2)}
.app-layout{display:grid;grid-template-columns:1fr 300px;min-height:calc(100vh - 52px)}
.content-col{border-right:1px solid var(--border);min-width:0}
.filters{position:sticky;top:52px;z-index:200;background:var(--white);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.f-btn{background:none;border:1px solid var(--border);padding:5px 13px;border-radius:20px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--g3);transition:all .13s}
.f-btn:hover{color:var(--g1);border-color:var(--g5)}
.f-btn.active{background:var(--red);border-color:var(--red);color:white;font-weight:500}
.f-sep{width:1px;height:16px;background:var(--border);flex-shrink:0;margin:0 2px}
.view-toggle{display:flex;gap:3px}
.vt-btn{background:none;border:1px solid var(--border);padding:5px 12px;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--g3);transition:all .12s}
.vt-btn.active{background:var(--g6);color:var(--g1);border-color:var(--g5);font-weight:500}
.sort-sel{margin-left:auto;background:none;border:1px solid var(--border);padding:5px 9px;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--g3);outline:none}
.count-lbl{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--g4)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:0}
.card{background:var(--white);border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;animation:rise .3s both;overflow:hidden}
.card:hover{background:var(--cream)}
.card:hover .card-img img{transform:scale(1.04)}
@keyframes rise{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.card-img{width:100%;height:155px;overflow:hidden;position:relative;background:var(--pink)}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease;display:block}
.card-img-fallback{position:absolute;inset:0;display:none;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:36px;color:var(--rose);background:var(--pink)}
.img-region-tag{position:absolute;top:8px;left:8px;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;letter-spacing:.4px;text-transform:uppercase;color:white;padding:2px 8px;border-radius:20px}
.tag-japan{background:rgba(192,57,43,.82)}.tag-na{background:rgba(30,80,60,.82)}.tag-custom{background:rgba(100,80,40,.82)}
.michelin-badge{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.92);border-radius:20px;padding:2px 8px;font-family:'DM Sans',sans-serif;font-size:10px;color:var(--red);font-weight:600;letter-spacing:.5px}
.card-body{padding:13px 15px 11px}
.card-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;line-height:1.2;color:var(--g1);margin-bottom:3px}
.card-meta{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--g4);margin-bottom:5px}
.card-type{font-family:'DM Sans',sans-serif;font-size:11px;font-style:italic;color:var(--g3);margin-bottom:7px}
.card-desc{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--g3);line-height:1.6;margin-bottom:11px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:9px;border-top:1px solid var(--border)}
.rating-block{display:flex;align-items:baseline;flex-wrap:wrap}
.rating-num{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--g1);line-height:1}
.rating-denom{font-family:'DM Sans',sans-serif;font-size:10px;color:var(--g4);margin-left:2px}
.rating-label{font-family:'DM Sans',sans-serif;font-size:10px;color:var(--g4);margin-left:5px;white-space:nowrap}
.rating-unrated{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--g5);font-style:italic}
.card-footer-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.price-lbl{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--g3)}
.rate-btn{background:none;border:1px solid var(--border);padding:4px 11px;border-radius:20px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--g3);transition:all .12s}
.rate-btn:hover{border-color:var(--red);color:var(--red)}
.rate-btn.rated{background:var(--pink);border-color:var(--rose);color:var(--red);font-weight:500}
#view-map{display:none}
#leaflet-map{width:100%;height:calc(100vh - 52px - 48px);min-height:400px;z-index:1}
.map-legend{position:absolute;bottom:28px;left:10px;background:white;border:1px solid var(--border);border-radius:8px;padding:10px 13px;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--g3);box-shadow:0 2px 8px rgba(0,0,0,.08);z-index:999}
.map-legend-item{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.map-legend-item:last-child{margin-bottom:0}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sushi-tooltip{font-family:'DM Sans',sans-serif;font-size:12px;line-height:1.5;border:1px solid var(--border)!important;border-radius:8px!important;padding:9px 12px!important;box-shadow:0 6px 20px rgba(0,0,0,.12)!important;background:white!important;color:var(--g1)!important;pointer-events:none}
.sushi-tooltip .t-name{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;margin-bottom:2px}
.sushi-tooltip .t-meta{color:var(--g4);font-size:11px;margin-bottom:3px}
.sushi-tooltip .t-rating{color:var(--red);font-size:12px;font-weight:500}
.leaflet-tooltip.sushi-tooltip::before{display:none}
.side-panel{position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;background:var(--white)}
.side-sec{padding:18px 18px 0}
.side-sec+.side-sec{border-top:1px solid var(--border);margin-top:14px;padding-top:18px}
.side-sec:last-child{padding-bottom:18px}
.side-heading{font-family:'DM Serif Display',serif;font-size:14px;color:var(--g1);margin-bottom:12px;letter-spacing:-.2px}
.side-heading em{font-style:italic;color:var(--red)}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px}
.stat-mini{background:var(--pink);border-radius:8px;padding:11px 8px;text-align:center}
.stat-mini-n{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--red);line-height:1}
.stat-mini-l{font-family:'DM Sans',sans-serif;font-size:10px;color:var(--g3);margin-top:2px}
.tag-cloud{display:flex;flex-wrap:wrap;gap:5px;padding-bottom:14px}
.tag-pill{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--g2);background:var(--g6);border:1px solid var(--border);padding:3px 9px;border-radius:20px;cursor:pointer;transition:all .12s}
.tag-pill:hover{background:var(--pink);border-color:var(--rose);color:var(--red)}
.rec-card{display:flex;gap:9px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .12s}
.rec-card:hover{opacity:.72}
.rec-card:last-child{border-bottom:none}
.rec-thumb{width:50px;height:50px;border-radius:7px;overflow:hidden;flex-shrink:0;background:var(--pink)}
.rec-thumb img{width:100%;height:100%;object-fit:cover}
.rec-info{flex:1;min-width:0}
.rec-name{font-family:'Playfair Display',serif;font-size:13px;font-weight:600;color:var(--g1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rec-meta{font-family:'DM Sans',sans-serif;font-size:10px;color:var(--g4);margin:1px 0 2px}
.rec-reason{font-family:'DM Sans',sans-serif;font-size:10px;color:var(--g3);font-style:italic}
.top-item{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .12s}
.top-item:hover{opacity:.7}
.top-item:last-child{border-bottom:none}
.top-rank{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--rose);width:20px;text-align:right;flex-shrink:0}
.top-name{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--g1);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-city{font-family:'DM Sans',sans-serif;font-size:10px;color:var(--g4);flex-shrink:0}
.top-score{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;color:var(--red);flex-shrink:0}
.overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.38);align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.overlay.open{display:flex}
@keyframes popin{from{opacity:0;transform:scale(.96) translateY(7px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-box{background:var(--white);border-radius:12px;max-width:400px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.14);animation:popin .2s ease;overflow:hidden;position:relative}
.modal-header{padding:22px 22px 18px;border-bottom:1px solid var(--border)}
.modal-title{font-family:'DM Serif Display',serif;font-size:21px;color:var(--g1)}
.modal-sub{font-family:'DM Sans',sans-serif;font-size:12px;color:var(--g3);margin-top:3px}
.modal-body{padding:18px 22px 22px}
.modal-close{position:absolute;top:12px;right:12px;background:var(--g6);border:none;width:27px;height:27px;border-radius:50%;cursor:pointer;color:var(--g3);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .12s;z-index:10;font-family:'DM Sans',sans-serif}
.modal-close:hover{background:var(--border);color:var(--g1)}
.form-field{margin-bottom:13px}
.form-label{display:block;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--g3);margin-bottom:5px}
.form-inp,.form-sel,.form-ta{width:100%;background:var(--g6);border:1px solid var(--border);padding:9px 11px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--g1);outline:none;border-radius:8px;transition:border-color .12s}
.form-inp:focus,.form-sel:focus,.form-ta:focus{border-color:var(--red);background:var(--white)}
.form-ta{resize:vertical;min-height:65px;font-size:13px;line-height:1.6}
.btn-primary{width:100%;padding:11px;background:var(--red);color:white;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:background .12s;border-radius:8px;margin-top:4px}
.btn-primary:hover{background:var(--red2)}
.modal-switch{text-align:center;margin-top:11px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--g3)}
.modal-switch a{color:var(--red);cursor:pointer;text-decoration:underline}
.rate-modal{background:var(--white);border-radius:12px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.14);animation:popin .2s ease;position:relative}
.rate-modal-img{width:100%;height:180px;overflow:hidden;position:relative;background:var(--pink)}
.rate-modal-img img{width:100%;height:100%;object-fit:cover}
.rate-modal-grad{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,rgba(0,0,0,.6))}
.rate-modal-name{position:absolute;bottom:13px;left:16px;right:48px;font-family:'DM Serif Display',serif;font-size:22px;font-style:italic;color:white;line-height:1.15}
.rate-modal-body{padding:16px 20px 22px}
.rate-modal-loc{font-family:'DM Sans',sans-serif;font-size:10px;color:var(--g4);margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px}
.rate-modal-type{font-family:'DM Sans',sans-serif;font-size:12px;font-style:italic;color:var(--g3);margin-bottom:10px}
.rate-modal-desc{font-family:'DM Sans',sans-serif;font-size:12.5px;color:var(--g2);line-height:1.7;border-left:3px solid var(--pink2);padding-left:11px;margin-bottom:14px}
.ext-links{display:flex;gap:8px;margin-bottom:16px;flex-direction:column}
.ext-link-row{display:flex;align-items:center;gap:8px}
.ext-link{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;text-decoration:none;transition:all .12s;cursor:pointer;flex-shrink:0;white-space:nowrap}
.ext-link:hover{opacity:.82;transform:translateY(-1px)}
.ext-link-yelp{background:#fff0f0;color:#d32323;border:1px solid #f5c6c6}
.ext-link-google{background:#f0f4fe;color:#3367d6;border:1px solid #c5d4f5}
.ext-rating-pill{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;background:var(--g6);border:1px solid var(--border);min-width:0}
.ext-rating-pill.yelp{background:#fff8f8;border-color:#f5c6c6}
.ext-rating-pill.google{background:#f5f7fe;border-color:#c5d4f5}
.ext-star{font-size:12px;line-height:1}
.ext-star.yelp{color:#d32323}
.ext-star.google{color:#f4a400}
.ext-rating-val{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;line-height:1;color:var(--g1)}
.ext-rating-ct{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--g4);white-space:nowrap}
.ext-rating-loading{display:flex;align-items:center;gap:3px;padding:0 2px}
.ext-rating-loading span{width:4px;height:4px;border-radius:50%;background:var(--g4);animation:ldot .9s infinite ease-in-out both}
.ext-rating-loading span:nth-child(2){animation-delay:.18s}
.ext-rating-loading span:nth-child(3){animation-delay:.36s}
@keyframes ldot{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.ext-no-key{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--g4);font-style:italic;cursor:pointer;text-decoration:underline;text-underline-offset:2px;padding:5px 2px}
.ext-no-key:hover{color:var(--g1)}
.settings-btn{background:none;border:1px solid var(--border);width:30px;height:30px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--g4);transition:all .12s;font-size:14px}
.settings-btn:hover{border-color:var(--g3);color:var(--g1);background:var(--g6)}
.settings-modal{background:var(--white);border-radius:12px;max-width:380px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.14);animation:popin .2s ease;position:relative;overflow:hidden}
.key-status{display:flex;align-items:center;gap:7px;padding:8px 11px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;margin-bottom:13px}
.key-status.set{background:#f0faf5;border:1px solid #b8e4cc;color:#2E7D5E}
.key-status.unset{background:var(--pink);border:1px solid var(--rose);color:var(--red)}
.key-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.key-dot.set{background:#2E7D5E}
.key-dot.unset{background:var(--red)}
.cache-info{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--g4);margin-top:9px;display:flex;justify-content:space-between;align-items:center}
.cache-clear-btn{background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--g4);text-decoration:underline;transition:color .12s;padding:0}
.cache-clear-btn:hover{color:var(--red)}
.modal-divider{height:1px;background:var(--border);margin:14px 0}
.write-review-hd{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--g3);margin-bottom:10px}
.login-notice{background:var(--pink);border:1px solid var(--rose);border-radius:8px;padding:8px 11px;margin-bottom:12px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--red);line-height:1.5}
.login-notice a{color:var(--red);cursor:pointer;font-weight:500;text-decoration:underline}
.slider-row{display:flex;align-items:baseline;gap:7px;margin-bottom:5px}
.slider-num{font-family:'Playfair Display',serif;font-size:44px;font-weight:700;color:var(--g1);line-height:1}
.slider-word{font-family:'DM Sans',sans-serif;font-size:13px;font-style:italic;color:var(--red)}
input[type=range].rng{-webkit-appearance:none;appearance:none;width:100%;height:3px;outline:none;cursor:pointer;border-radius:2px;background:linear-gradient(to right,var(--red) 50%,var(--border) 50%);margin:7px 0}
input[type=range].rng::-webkit-slider-thumb{-webkit-appearance:none;width:19px;height:19px;border-radius:50%;background:var(--white);border:2.5px solid var(--red);cursor:pointer;box-shadow:0 2px 5px rgba(192,57,43,.28);transition:transform .1s}
input[type=range].rng::-webkit-slider-thumb:hover{transform:scale(1.2)}
input[type=range].rng:disabled{opacity:.4;cursor:not-allowed}
.slider-ends{display:flex;justify-content:space-between;font-family:'DM Sans',sans-serif;font-size:10px;color:var(--g4);margin-bottom:11px}
.review-ta{width:100%;background:var(--g6);border:1px solid var(--border);padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--g1);outline:none;border-radius:8px;transition:border-color .12s;resize:vertical;min-height:74px;line-height:1.6}
.review-ta:focus{border-color:var(--red);background:var(--white)}
.review-ta::placeholder{color:var(--g4)}
.review-ta:disabled,.review-ta:disabled::placeholder{opacity:.45;cursor:not-allowed}
.submit-btn{width:100%;padding:10px;margin-top:10px;background:var(--red);color:white;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:background .12s;border-radius:8px}
.submit-btn:hover:not(:disabled){background:var(--red2)}
.submit-btn.updated{background:#2E7D5E}
.submit-btn.updated:hover{background:#256b4f}
.submit-btn:disabled{opacity:.45;cursor:not-allowed}
.reviews-hd{display:flex;align-items:center;justify-content:space-between;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--g3);margin-bottom:12px}
.reviews-count{font-weight:400;color:var(--g4)}
.review-item{padding:11px 0;border-bottom:1px solid var(--border)}
.review-item:last-child{border-bottom:none}
.review-top{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.review-avatar{width:26px;height:26px;border-radius:50%;color:white;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;flex-shrink:0}
.review-user{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--g1)}
.review-you{font-size:10px;color:var(--g4);font-weight:400}
.review-date{font-family:'DM Sans',sans-serif;font-size:10px;color:var(--g4)}
.review-score-wrap{margin-left:auto;display:flex;align-items:baseline;gap:1px;flex-shrink:0}
.review-score{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--red)}
.review-score-denom{font-family:'DM Sans',sans-serif;font-size:10px;color:var(--g4)}
.review-del{background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:10px;color:var(--g4);text-decoration:underline;margin-left:7px;transition:color .12s;padding:0}
.review-del:hover{color:var(--red)}
.review-text{font-family:'DM Sans',sans-serif;font-size:12.5px;color:var(--g2);line-height:1.65}
.review-no-text{font-family:'DM Sans',sans-serif;font-size:12px;color:var(--g4);font-style:italic}
.no-reviews{font-family:'DM Sans',sans-serif;font-size:12px;color:var(--g4);font-style:italic;padding:6px 0}
.add-modal{background:var(--white);border-radius:12px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.14);animation:popin .2s ease}
.add-hd{padding:20px 22px 16px;border-bottom:1px solid var(--border);position:relative}
.add-hd-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--g1)}
.add-hd-sub{font-family:'DM Sans',sans-serif;font-size:12px;color:var(--g3);margin-top:3px}
.add-body{padding:18px 22px 22px}
.form-row{margin-bottom:13px}
.form-row.two{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.form-label span{color:var(--red)}
.form-footer{display:flex;gap:8px;justify-content:flex-end;padding-top:13px;border-top:1px solid var(--border)}
.btn-cancel{background:none;border:1px solid var(--border);padding:8px 16px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--g3);transition:all .12s}
.btn-cancel:hover{border-color:var(--g1);color:var(--g1)}
.btn-save{background:var(--red);color:white;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;transition:background .12s}
.btn-save:hover{background:var(--red2)}
.user-chip{display:flex;align-items:center;gap:7px;background:var(--g6);border:1px solid var(--border);padding:5px 11px;border-radius:20px}
.user-avatar-hdr{width:19px;height:19px;border-radius:50%;color:white;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700}
.user-name-chip{font-family:'DM Sans',sans-serif;font-size:12px;color:var(--g1)}
.logout-btn{background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--g4);text-decoration:underline;transition:color .12s}
.logout-btn:hover{color:var(--red)}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--g1);color:white;padding:9px 18px;border-radius:20px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;z-index:600;animation:tin .2s ease,tout .2s 2.6s ease forwards;white-space:nowrap}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(5px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes tout{to{opacity:0;transform:translateX(-50%) translateY(5px)}}
.empty{text-align:center;padding:60px 40px;font-family:'Playfair Display',serif;font-size:17px;color:var(--g4)}
@media(max-width:900px){.app-layout{grid-template-columns:1fr}.side-panel{display:none}header{padding:0 14px}.search-wrap input{width:120px}.add-btn{display:none}}
</style>
</head>
<body>
<header>
  <a class="logo" onclick="showView('grid')">
    <span class="logo-text">Sushicho</span>
    <span class="logo-jp">鮨帖</span>
  </a>
  <nav>
    <button class="nav-btn active" id="btn-grid" onclick="showView('grid')">Browse</button>
    <button class="nav-btn" id="btn-map" onclick="showView('map')">Map</button>
  </nav>
  <div class="hdr-right">
    <div class="search-wrap">
      <span class="search-lbl">Search</span>
      <input type="text" placeholder="Restaurant, city..." id="search-inp" oninput="onSearch()">
    </div>
    <div id="user-area"></div>
   
    <button class="add-btn" onclick="openAddModal()">+ Add</button>
  </div>
</header>
<div class="app-layout">
  <div class="content-col">
    <div class="filters">
      <button class="f-btn active" onclick="setFilter('all',this)">All</button>
      <button class="f-btn" onclick="setFilter('japan',this)">Japan</button>
      <button class="f-btn" onclick="setFilter('na',this)">N. America</button>
      <div class="f-sep"></div>
      <button class="f-btn" onclick="setFilter('rated',this)">My Reviews</button>
      <button class="f-btn" onclick="setFilter('custom',this)">Community</button>
      <div class="view-toggle">
        <button class="vt-btn active" id="vt-grid" onclick="switchDisplay('grid')">Grid</button>
        <button class="vt-btn" id="vt-map" onclick="switchDisplay('map')">Map</button>
      </div>
      <select class="sort-sel" onchange="setSort(this.value)">
        <option value="default">Default order</option>
        <option value="rhi">Highest rated</option>
        <option value="rlo">Lowest rated</option>
        <option value="az">Name A-Z</option>
        <option value="ph">Price $$$$-$</option>
        <option value="pl">Price $-$$$$</option>
      </select>
      <span class="count-lbl" id="count-lbl"></span>
    </div>
    <div id="view-grid">
      <div class="grid" id="grid"></div>
      <div class="empty" id="empty-state" style="display:none">No restaurants found.</div>
    </div>
    <div id="view-map" style="display:none;position:relative">
      <div id="leaflet-map"></div>
      <div class="map-legend">
        <div class="map-legend-item"><div class="legend-dot" style="background:#C0392B"></div>Japan</div>
        <div class="map-legend-item"><div class="legend-dot" style="background:#1a5c3a"></div>N. America</div>
        <div class="map-legend-item"><div class="legend-dot" style="background:white;border:1.5px solid #999"></div>Not reviewed</div>
        <div class="map-legend-item"><div class="legend-dot" style="background:#C0392B"></div>Reviewed (score inside)</div>
      </div>
    </div>
  </div>
  <div class="side-panel">
    <div class="side-sec">
      <div class="side-heading">Your <em>Collection</em></div>
      <div class="stats-row">
        <div class="stat-mini"><div class="stat-mini-n" id="s-total">47</div><div class="stat-mini-l">Counters</div></div>
        <div class="stat-mini"><div class="stat-mini-n" id="s-reviewed">0</div><div class="stat-mini-l">Reviewed</div></div>
        <div class="stat-mini"><div class="stat-mini-n" id="s-michelin">26</div><div class="stat-mini-l">Michelin</div></div>
      </div>
      <div class="tag-cloud" id="tag-cloud"></div>
    </div>
    <div class="side-sec">
      <div class="side-heading">Recommended <em>for You</em></div>
      <div id="rec-list"></div>
    </div>
    <div class="side-sec" id="top-section" style="display:none">
      <div class="side-heading">Your <em>Top Rated</em></div>
      <div id="top-list"></div>
    </div>
  </div>
</div>

<!-- Auth Modal -->
<div class="overlay" id="auth-overlay" onclick="closeIfOutside(event,'auth-overlay')">
  <div class="modal-box">
    <button class="modal-close" onclick="closeAuthModal()">x</button>
    <div id="auth-inner"></div>
  </div>
</div>

<!-- Review Modal -->
<div class="overlay" id="rate-overlay" onclick="closeIfOutside(event,'rate-overlay')">
  <div class="rate-modal">
    <div class="rate-modal-img" id="m-img-wrap">
      <div class="rate-modal-grad"></div>
      <div class="rate-modal-name" id="m-name"></div>
      <button class="modal-close" onclick="closeModal()">x</button>
    </div>
    <div class="rate-modal-body">
      <div class="rate-modal-loc" id="m-loc"></div>
      <div class="rate-modal-type" id="m-type"></div>
      <div class="rate-modal-desc" id="m-desc"></div>
      <div class="ext-links" id="m-ext-links"></div>
      <div class="modal-divider"></div>
      <div class="write-review-hd" id="m-write-hd">Write a Review</div>
      <div id="m-login-notice"></div>
      <div class="slider-row">
        <div class="slider-num" id="m-val">5</div>
        <div class="slider-word" id="m-cap">Decent</div>
      </div>
      <input type="range" class="rng" id="m-slider" min="1" max="10" value="5" step="1" oninput="onSlider(this.value)">
      <div class="slider-ends"><span>1 - Poor</span><span>10 - Perfect</span></div>
      <textarea class="review-ta" id="m-review-text" placeholder="Share your experience - the fish, the rice, the atmosphere..."></textarea>
      <button class="submit-btn" id="m-submit" onclick="submitReview()">Submit Review</button>
      <div class="modal-divider"></div>
      <div class="reviews-hd">Reviews<span class="reviews-count" id="m-reviews-count"></span></div>
      <div id="m-reviews-list"></div>
    </div>
  </div>
</div>

<!-- Add Modal -->
<div class="overlay" id="add-overlay" onclick="closeIfOutside(event,'add-overlay')">
  <div class="add-modal">
    <div class="add-hd">
      <button class="modal-close" onclick="closeAddModal()">x</button>
      <div class="add-hd-title">Add a Restaurant</div>
      <div class="add-hd-sub">Know a great sushi counter not yet listed?</div>
    </div>
    <div class="add-body">
      <div class="form-row two">
        <div><label class="form-label">Name <span>*</span></label><input class="form-inp" id="f-name" type="text" placeholder="Sushi Saito"></div>
        <div><label class="form-label">City <span>*</span></label><input class="form-inp" id="f-city" type="text" placeholder="Tokyo"></div>
      </div>
      <div class="form-row two">
        <div><label class="form-label">Neighborhood</label><input class="form-inp" id="f-area" type="text" placeholder="Ginza"></div>
        <div><label class="form-label">Country <span>*</span></label>
          <select class="form-sel" id="f-country">
            <option value="">Select</option><option value="Japan">Japan</option>
            <option value="USA">United States</option><option value="Canada">Canada</option>
            <option value="Mexico">Mexico</option><option value="Other">Other</option>
          </select>
        </div>
      </div>
      <div class="form-row two">
        <div><label class="form-label">Type <span>*</span></label>
          <select class="form-sel" id="f-type">
            <option value="">Select</option><option>Edomae Omakase</option><option>Contemporary Omakase</option>
            <option>Traditional Japanese</option><option>Contemporary Japanese</option>
            <option>Hokkaido Omakase</option><option>Sushi Bar</option><option>Other</option>
          </select>
        </div>
        <div><label class="form-label">Price <span>*</span></label>
          <select class="form-sel" id="f-price">
            <option value="">Select</option><option>$</option><option>$$</option><option>$$$</option><option>$$$$</option>
          </select>
        </div>
      </div>
      <div class="form-row two">
        <div><label class="form-label">Michelin Stars</label>
          <select class="form-sel" id="f-michelin">
            <option value="0">None</option><option value="1">1 Star</option><option value="2">2 Stars</option><option value="3">3 Stars</option>
          </select>
        </div>
        <div><label class="form-label">Image URL</label><input class="form-inp" id="f-img" type="text" placeholder="https://..."></div>
      </div>
      <div class="form-row"><label class="form-label">Description</label><textarea class="form-ta" id="f-desc" placeholder="What makes this counter special..."></textarea></div>
      <div class="form-row two">
        <div><label class="form-label">Latitude</label><input class="form-inp" id="f-lat" type="number" step="any" placeholder="35.6741"></div>
        <div><label class="form-label">Longitude</label><input class="form-inp" id="f-lng" type="number" step="any" placeholder="139.7641"></div>
      </div>
      <div class="form-footer">
        <button class="btn-cancel" onclick="closeAddModal()">Cancel</button>
        <button class="btn-save" onclick="submitAdd()">Add to Database</button>
      </div>
    </div>
  </div>
</div>

const BASE=[
  {id:1,name:"Sukiyabashi Jiro",area:"Ginza",city:"Tokyo",country:"Japan",region:"japan",lat:35.6741,lng:139.7641,type:"Edomae Omakase",price:"$$$$",m:3,desc:"The world's most famous sushi counter, owned by legendary chef Jiro Ono. Immortalized in film, this ten-seat Ginza counter defined modern omakase for generations."},

  {id:3,name:"Harutaka",area:"Ginza",city:"Tokyo",country:"Japan",region:"japan",lat:35.6727,lng:139.7659,type:"Edomae Omakase",price:"$$$$",m:3,desc:"Tokyo's three-Michelin-star sushi counter. Chef Harutaka Negishi's conger eel preparation alone justifies the 60,000-yen price."},
  {id:4,name:"Sushi Yoshitake",area:"Ginza",city:"Tokyo",country:"Japan",region:"japan",lat:35.6728,lng:139.7662,type:"Edomae Omakase",price:"$$$$",m:3,desc:"Three Michelin stars. Chef Masahiro Yoshitake's rice balanced with aged red vinegar is perhaps the finest in Tokyo."},
  {id:5,name:"Sushi Sho",area:"Yotsuya",city:"Tokyo",country:"Japan",region:"japan",lat:35.6866,lng:139.7239,type:"Edomae Omakase",price:"$$$$",m:2,desc:"A near-mythical counter whose reservations open only on January 1st. Chef Keiji Nakazawa's Edomae techniques are historically important."},
  {id:6,name:"Esaki",area:"Shibuya",city:"Tokyo",country:"Japan",region:"japan",lat:35.6659,lng:139.7251,type:"Edomae Omakase",price:"$$$$",m:3,desc:"Three-Michelin-star counter in Shibuya. Chef Shintaro Esaki's mastery of fish aging and rice seasoning is among the finest in the capital."},

  {id:8,name:"Sushi Namba Hibiya",area:"Hibiya",city:"Tokyo",country:"Japan",region:"japan",lat:35.6735,lng:139.7599,type:"Edomae Omakase",price:"$$$$",m:0,desc:"Chef Hidefumi Namba is one of Japan's most revered shokunin. His member-only counter delivers some of Tokyo's most precise nigiri."},

  {id:29,name:"Nobu Malibu",area:"Pacific Coast Hwy",city:"Malibu",country:"USA",region:"na",lat:34.0259,lng:-118.7798,type:"Contemporary Japanese",price:"$$$$",m:0,desc:"Pacific views and Nobu Matsuhisa's perfected classics. The black cod miso and yellowtail jalapeno are essential."},

const CAPS={1:"Poor",2:"Disappointing",3:"Below Average",4:"Mediocre",5:"Decent",6:"Good",7:"Very Good",8:"Excellent",9:"Outstanding",10:"Perfect"};
const AVATAR_COLORS=['#C0392B','#8E44AD','#2980B9','#27AE60','#D35400','#16A085','#2C3E50'];
function mStars(n){return n?'★'.repeat(n):'';}
function getImg(r){return r.img||getImgForId(r.id);}
function fmtDate(iso){return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function avatarColor(u){let h=0;for(const c of(u||'?'))h=(h*31+c.charCodeAt(0))%AVATAR_COLORS.length;return AVATAR_COLORS[h];}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function yelpUrl(r){return 'https://www.yelp.com/search?find_desc='+encodeURIComponent(r.name)+'&find_loc='+encodeURIComponent(r.city+(r.country!=='USA'?', '+r.country:''));}
function googleUrl(r){return 'https://www.google.com/maps/search/'+encodeURIComponent(r.name+' '+r.city);}

// Review shape: { id, restaurantId, userId, rating, text, createdAt, updatedAt }
// TODO: replace localStorage calls below with fetch('/api/reviews', ...) calls
function getAllReviews(){try{return JSON.parse(localStorage.getItem('sc_reviews')||'[]');}catch(e){return[];}}
function saveAllReviews(a){localStorage.setItem('sc_reviews',JSON.stringify(a));}
function getRestaurantReviews(rid){return getAllReviews().filter(r=>String(r.restaurantId)===String(rid));}
function getMyReview(rid){const u=getCurrentUser();if(!u)return null;return getAllReviews().find(r=>String(r.restaurantId)===String(rid)&&r.userId===u)||null;}
function upsertReview(rid,rating,text){
  // TODO: POST /api/reviews or PUT /api/reviews/:id
  const u=getCurrentUser();if(!u)return;
  const all=getAllReviews();const idx=all.findIndex(r=>String(r.restaurantId)===String(rid)&&r.userId===u);
  const now=new Date().toISOString();
  const rv={id:idx>=0?all[idx].id:'rv_'+Date.now(),restaurantId:String(rid),userId:u,rating,text:text.trim(),createdAt:idx>=0?all[idx].createdAt:now,updatedAt:now};
  if(idx>=0)all[idx]=rv;else all.push(rv);
  saveAllReviews(all);return rv;
}
function deleteReview(id){
  // TODO: DELETE /api/reviews/:id
  saveAllReviews(getAllReviews().filter(r=>r.id!==id));
}
function getRatings(){const u=getCurrentUser();if(!u)return{};const m={};getAllReviews().filter(r=>r.userId===u).forEach(r=>{m[r.restaurantId]=r.rating;});return m;}
function getRestaurantStats(rid){const rv=getRestaurantReviews(rid);if(!rv.length)return{avg:null,count:0};const avg=rv.reduce((s,r)=>s+r.rating,0)/rv.length;return{avg:Math.round(avg*10)/10,count:rv.length};}

// ── STATE & FILTER ────────────────────────────────────────────────────────
let st={filter:'all',sort:'default',search:'',activeId:null,display:'grid'};
function getFiltered(){
  const rats=getRatings();let list=allRestaurants();
  if(st.filter==='japan')list=list.filter(r=>r.region==='japan');
  if(st.filter==='na')list=list.filter(r=>r.region==='na');
  if(st.filter==='rated')list=list.filter(r=>rats[r.id]);
  if(st.filter==='custom')list=list.filter(r=>r.isCustom);
  const q=st.search.toLowerCase();
  if(q)list=list.filter(r=>[r.name,r.city,r.area,r.country,r.type].join(' ').toLowerCase().includes(q));
  if(st.sort==='rhi')list.sort((a,b)=>(rats[b.id]||0)-(rats[a.id]||0));
  if(st.sort==='rlo')list.sort((a,b)=>(rats[a.id]||0)-(rats[b.id]||0));
  if(st.sort==='az')list.sort((a,b)=>a.name.localeCompare(b.name));
  if(st.sort==='ph')list.sort((a,b)=>b.price.length-a.price.length);
  if(st.sort==='pl')list.sort((a,b)=>a.price.length-b.price.length);
  return list;
}

// ── RENDER CARDS ──────────────────────────────────────────────────────────
function renderCards(){
  const list=getFiltered(),rats=getRatings(),all=allRestaurants();
  document.getElementById('s-total').textContent=all.length;
  document.getElementById('s-reviewed').textContent=Object.keys(rats).length;
  document.getElementById('s-michelin').textContent=all.filter(r=>r.m>0).length;
  document.getElementById('count-lbl').textContent=list.length+' shown';
  const grid=document.getElementById('grid'),emp=document.getElementById('empty-state');
  if(!list.length){grid.innerHTML='';emp.style.display='block';return;}
  emp.style.display='none';
  grid.innerHTML=list.map((r,i)=>{
    const myRat=rats[r.id],reg=r.isCustom?'custom':r.region;
    const regionLabel=r.isCustom?'Community':(r.region==='japan'?'Japan':r.country);
    const{avg,count}=getRestaurantStats(r.id);
    let ratingHtml;
    if(myRat){ratingHtml=`<div class="rating-block"><span class="rating-num">${myRat}</span><span class="rating-denom">/10</span><span class="rating-label">your rating</span></div>`;}
    else if(avg!==null){ratingHtml=`<div class="rating-block"><span class="rating-num" style="color:var(--g3);font-size:18px">${avg}</span><span class="rating-denom">/10</span><span class="rating-label">${count} review${count!==1?'s':''}</span></div>`;}
    else{ratingHtml=`<span class="rating-unrated">No reviews yet</span>`;}
    return`<div class="card" style="animation-delay:${(i%12)*.028}s" onclick="openModal(${r.id})">
      <div class="card-img"><img src="${getImg(r)}" alt="${escHtml(r.name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="card-img-fallback">鮨</div><div class="img-region-tag tag-${reg}">${regionLabel}</div>${r.m?`<div class="michelin-badge">${mStars(r.m)}</div>`:''}</div>
      <div class="card-body"><div class="card-name">${escHtml(r.name)}</div><div class="card-meta">${r.area?escHtml(r.area)+' · ':''}${escHtml(r.city)}</div><div class="card-type">${escHtml(r.type)}</div><div class="card-desc">${escHtml(r.desc)}</div>
      <div class="card-footer">${ratingHtml}<div class="card-footer-right"><span class="price-lbl">${r.price}</span><button class="rate-btn ${myRat?'rated':''}" onclick="event.stopPropagation();openModal(${r.id})">${myRat?'Reviewed':'Review'}</button></div></div></div></div>`;
  }).join('');
}

// ── SIDE PANEL ────────────────────────────────────────────────────────────
function renderSidePanel(){

let leafletMap=null,leafletMarkers={};
function makeMarkerIcon(r,rat){const col=r.region==='japan'?'#C0392B':'#1a5c3a';const size=rat?24:14,half=size/2;const inner=rat?`<div style="width:${size}px;height:${size}px;border-radius:50%;background:${col};display:flex;align-items:center;justify-content:center;color:white;font-size:9px;font-weight:700;font-family:sans-serif;box-shadow:0 2px 8px rgba(0,0,0,.3);cursor:pointer">${rat}</div>`:`<div style="width:${size}px;height:${size}px;border-radius:50%;background:white;border:2px solid ${col};box-shadow:0 2px 6px rgba(0,0,0,.2);cursor:pointer"></div>`;return L.divIcon({className:'',html:inner,iconSize:[size,size],iconAnchor:[half,half],tooltipAnchor:[half,-half]});}
function makeTooltipContent(r,rat){const{avg,count}=getRestaurantStats(r.id);let rLine;if(rat)rLine=`<div class="t-rating">Your rating: ${rat}/10 - ${CAPS[rat]}</div>`;else if(avg)rLine=`<div class="t-rating">${avg}/10 · ${count} review${count!==1?'s':''}</div>`;else rLine=`<div class="t-rating" style="color:#999">No reviews yet</div>`;const meta=[r.area,r.city,r.price,r.m?mStars(r.m):null].filter(Boolean).join(' · ');return`<div class="t-name">${escHtml(r.name)}</div><div class="t-meta">${escHtml(meta)}</div>${rLine}`;}
function drawMap(){if(!leafletMap)return;const rats=getRatings(),list=getFiltered().filter(r=>r.lat&&r.lng),visIds=new Set(list.map(r=>String(r.id)));Object.keys(leafletMarkers).forEach(id=>{if(!visIds.has(id)){leafletMap.removeLayer(leafletMarkers[id]);delete leafletMarkers[id];}});list.forEach(r=>{const rat=rats[r.id],id=String(r.id),icon=makeMarkerIcon(r,rat);if(leafletMarkers[id]){leafletMarkers[id].setIcon(icon);leafletMarkers[id].setTooltipContent(makeTooltipContent(r,rat));}else{const m=L.marker([r.lat,r.lng],{icon,riseOnHover:true});m.bindTooltip(makeTooltipContent(r,rat),{className:'sushi-tooltip',direction:'top',offset:[0,-4],opacity:1});m.on('click',()=>openModal(r.id));m.addTo(leafletMap);leafletMarkers[id]=m;}});}
function showMap(){if(!leafletMap){leafletMap=L.map('leaflet-map',{center:[35,-30],zoom:2});L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',subdomains:'abcd',maxZoom:19}).addTo(leafletMap);}setTimeout(()=>{leafletMap.invalidateSize();drawMap();},80);}

// ── RATING CACHE ──────────────────────────────────────────────────────────
const CACHE_TTL = 24 * 60 * 60 * 1000; // 24 hours

function getCachedRating(rid) {
  try {
    const c = JSON.parse(localStorage.getItem('sc_xr_' + rid) || 'null');
    if (!c || Date.now() - new Date(c.at).getTime() > CACHE_TTL) return null;
    return c.data;
  } catch (e) { return null; }
}

function setCachedRating(rid, data) {
  localStorage.setItem('sc_xr_' + rid, JSON.stringify({ data, at: new Date().toISOString() }));
}

function countCached() { 
  return Object.keys(localStorage).filter(k => k.startsWith('sc_xr_')).length; 
}

function clearRatingCache() {
  Object.keys(localStorage).filter(k => k.startsWith('sc_xr_')).forEach(k => localStorage.removeItem(k));
  updateCacheCount();
  if (typeof showToast === 'function') showToast('Rating cache cleared.');
}

function updateCacheCount() {
  const el = document.getElementById('cache-count-lbl');
  if (el) el.textContent = countCached() + ' restaurants cached';
}

// ── FETCH RATINGS (Calling your Vercel Proxy) ─────────────────────────────
async function fetchExternalRatings(r) {
  // 1. Check local cache first
  const cached = getCachedRating(r.id);
  if (cached) return cached;

  try {
    // 2. Call your internal API route
    const res = await fetch('https://sushichoback.vercel.app/api/key-api', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        name: r.name, 
        city: r.city, 
        country: r.country 
      })
    });

    if (!res.ok) throw new Error('API request failed');

    const ratings = await res.json();

    // 3. Store in cache and return
    setCachedRating(r.id, ratings);
    return ratings;

  } catch (e) {
    console.warn('fetchExternalRatings:', e);
    return null;
  }
}

const GMAP_SVG=`<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>`;

function ratingPill(platform,data,loading){
  if(loading){
    return`<div class="ext-rating-pill ${platform}"><div class="ext-rating-loading"><span></span><span></span><span></span></div></div>`;
  }
  if(!data||data.rating===null){
    return`<div class="ext-rating-pill ${platform}" style="color:var(--g4);font-size:11px;font-style:italic">not found</div>`;
  }
  return`<div class="ext-rating-pill ${platform}">
    <span class="ext-star ${platform}">★</span>
    <span class="ext-rating-val">${data.rating}</span>
    <span class="ext-rating-ct">${fmtN(data.reviews)} reviews</span>
  </div>`;
}
function renderExtLinks(r, ratings, loading) {
  // We removed "const hasKey" because the key is now safely on Vercel!
  return `
    <div class="ext-link-row">
      <a class="ext-link ext-link-yelp" href="${yelpUrl(r)}" target="_blank" rel="noopener">${YELP_SVG} Yelp ↗</a>
      ${ratingPill('yelp', ratings?.yelp, loading)}
    </div>
    <div class="ext-link-row">
      <a class="ext-link ext-link-google" href="${googleUrl(r)}" target="_blank" rel="noopener">${GMAP_SVG} Google Maps ↗</a>
      ${ratingPill('google', ratings?.google, loading)}
    </div>`;
}



// ── REVIEW MODAL ──────────────────────────────────────────────────────────
function openModal(id){
  const all=allRestaurants(),r=all.find(x=>x.id==id);if(!r)return;
  st.activeId=id;
  const user=getCurrentUser(),myReview=getMyReview(id);
  const iw=document.getElementById('m-img-wrap');
  let img=iw.querySelector('img');if(!img){img=document.createElement('img');img.style.cssText='width:100%;height:100%;object-fit:cover';iw.insertBefore(img,iw.firstChild);}
  img.src=getImg(r);
  document.getElementById('m-name').textContent=r.name;
  document.getElementById('m-loc').textContent=[r.area,r.city,r.country,r.price,r.m?mStars(r.m)+' Michelin':null].filter(Boolean).join(' · ');
  document.getElementById('m-type').textContent=r.type;
  document.getElementById('m-desc').textContent=r.desc||'';
  // Show buttons immediately; show loading dots if key is set, then fetch
  document.getElementById('m-ext-links').innerHTML = renderExtLinks(r, null, true);
  fetchExternalRatings(r).then(ratings=>{
    if(ratings!==null&&String(st.activeId)===String(id)){
      document.getElementById('m-ext-links').innerHTML=renderExtLinks(r,ratings,false);
    } else if(ratings===null&&String(st.activeId)===String(id)&&true()){
      document.getElementById('m-ext-links').innerHTML=renderExtLinks(r,null,false);
    }
  });
  document.getElementById('m-write-hd').textContent=myReview?'Update Your Review':'Write a Review';
  const notice=document.getElementById('m-login-notice');
  notice.innerHTML=!user?`<div class="login-notice"><a onclick="closeModal();openLogin()">Sign in</a> to write and save your review.</div>`:'';
  const val=myReview?myReview.rating:5;
  const slider=document.getElementById('m-slider');
  slider.value=val;slider.disabled=!user;
  onSlider(val);
  const ta=document.getElementById('m-review-text');
  ta.value=myReview?.text||'';ta.disabled=!user;
  const btn=document.getElementById('m-submit');
  btn.disabled=!user;btn.textContent=myReview?'Update Review':'Submit Review';
  btn.className='submit-btn'+(myReview?' updated':'');
  renderReviewsList(id);
  document.getElementById('rate-overlay').classList.add('open');document.body.style.overflow='hidden';
}
function renderReviewsList(rid){
  const reviews=getRestaurantReviews(rid).sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt));
  const user=getCurrentUser();
  document.getElementById('m-reviews-count').textContent=reviews.length?' · '+reviews.length+' review'+(reviews.length!==1?'s':''):'';
  if(!reviews.length){document.getElementById('m-reviews-list').innerHTML=`<div class="no-reviews">No reviews yet - be the first!</div>`;return;}
  document.getElementById('m-reviews-list').innerHTML=reviews.map(rv=>{
    const isOwn=rv.userId===user,col=avatarColor(rv.userId);
    return`<div class="review-item"><div class="review-top"><div class="review-avatar" style="background:${col}">${rv.userId[0].toUpperCase()}</div><div><div class="review-user">${escHtml(rv.userId)}${isOwn?' <span class="review-you">(you)</span>':''}</div><div class="review-date">${fmtDate(rv.updatedAt)}</div></div><div class="review-score-wrap"><span class="review-score">${rv.rating}</span><span class="review-score-denom">/10</span>${isOwn?`<button class="review-del" onclick="handleDeleteReview('${rv.id}',${rid})">delete</button>`:''}</div></div>${rv.text?`<div class="review-text">${escHtml(rv.text)}</div>`:`<div class="review-no-text">No written review.</div>`}</div>`;
  }).join('');
}
function handleDeleteReview(reviewId,rid){
  if(!confirm('Delete your review?'))return;
  deleteReview(reviewId);
  document.getElementById('m-review-text').value='';
  document.getElementById('m-slider').value=5;onSlider(5);
  const btn=document.getElementById('m-submit');btn.textContent='Submit Review';btn.className='submit-btn';
  document.getElementById('m-write-hd').textContent='Write a Review';
  renderReviewsList(rid);renderCards();renderSidePanel();if(st.display==='map')drawMap();
  showToast('Review deleted.');
}
function closeModal(){document.getElementById('rate-overlay').classList.remove('open');document.body.style.overflow='';}
function onSlider(val){val=parseInt(val);const pct=(val-1)/9*100;document.getElementById('m-val').textContent=val;document.getElementById('m-cap').textContent=CAPS[val]||'';document.getElementById('m-slider').style.background=`linear-gradient(to right,var(--red) ${pct}%,var(--border) ${pct}%)`;}
function submitReview(){
  const user=getCurrentUser();if(!user){openLogin();return;}
  const rating=parseInt(document.getElementById('m-slider').value),text=document.getElementById('m-review-text').value;
  const existed=!!getMyReview(st.activeId);
  upsertReview(st.activeId,rating,text);
  renderReviewsList(st.activeId);
  const btn=document.getElementById('m-submit');btn.textContent='Update Review';btn.className='submit-btn updated';
  document.getElementById('m-write-hd').textContent='Update Your Review';
  renderCards();renderSidePanel();if(st.display==='map')drawMap();
  const r=allRestaurants().find(x=>x.id==st.activeId);
  showToast((r?r.name:'Restaurant')+' \xb7 '+rating+'/10 '+(existed?'updated':'saved'));
}

// ── ADD MODAL ─────────────────────────────────────────────────────────────
function openAddModal(){document.getElementById('add-overlay').classList.add('open');document.body.style.overflow='hidden';}
function closeAddModal(){document.getElementById('add-overlay').classList.remove('open');document.body.style.overflow='';}
function submitAdd(){const name=document.getElementById('f-name').value.trim(),city=document.getElementById('f-city').value.trim(),country=document.getElementById('f-country').value,type=document.getElementById('f-type').value,price=document.getElementById('f-price').value;if(!name||!city||!country||!type||!price){alert('Please fill in all required fields.');return;}const newR={id:'c_'+Date.now(),name,city,country,area:document.getElementById('f-area').value.trim(),type,price,m:parseInt(document.getElementById('f-michelin').value)||0,desc:document.getElementById('f-desc').value.trim(),img:document.getElementById('f-img').value.trim()||null,lat:parseFloat(document.getElementById('f-lat').value)||null,lng:parseFloat(document.getElementById('f-lng').value)||null,isCustom:true};const list=getCustom();list.push(newR);saveCustom(list);closeAddModal();['f-name','f-city','f-area','f-desc','f-lat','f-lng','f-img'].forEach(id=>document.getElementById(id).value='');['f-country','f-type','f-price'].forEach(id=>document.getElementById(id).value='');document.getElementById('f-michelin').value='0';renderCards();renderSidePanel();showToast(name+' added!');}

function closeIfOutside(e,id){if(e.target.id===id){if(id==='rate-overlay')closeModal();else if(id==='add-overlay')closeAddModal();else if(id==='auth-overlay')closeAuthModal();else if(id==='settings-overlay')closeSettings();}}
function showToast(msg){document.querySelectorAll('.toast').forEach(t=>t.remove());const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3200);}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeAddModal();closeAuthModal();}if(e.key==='Enter'){const ao=document.getElementById('auth-overlay');if(ao.classList.contains('open')){if(document.getElementById('au-pass2'))doRegister();else doLogin();}}});
window.addEventListener('resize',()=>{if(st.display==='map'&&leafletMap)leafletMap.invalidateSize();});
function fmtN(n) {
  if (!n) return '0';
  if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
  return String(n);
}
function getApiKey() {
  return true; // We return true to allow the fetch to proceed
}

renderUserArea();renderCards();renderSidePanel();
</script>
